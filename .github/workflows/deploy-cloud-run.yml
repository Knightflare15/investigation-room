name: Deploy Cloud Run

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    if: github.repository_owner != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud builds submit --tag "${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_REPOSITORY }}/investigation-room:${{ github.sha }}"
      - run: >
          gcloud run deploy investigation-room
          --image "${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_REPOSITORY }}/investigation-room:${{ github.sha }}"
          --region "${{ secrets.GCP_REGION }}"
          --platform managed
          --allow-unauthenticated
          --min-instances 0
          --max-instances 3
          --cpu 1
          --memory 512Mi
          --set-env-vars INVESTIGATION_AI_PROVIDER=gemini,INVESTIGATION_SECURE_COOKIES=true,INVESTIGATION_RATE_LIMITS_ENABLED=true
