services:
  postgres:
    image: postgres:16
    container_name: investigation-room-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: investigation_room
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - investigation_room_pgdata:/var/lib/postgresql/data

volumes:
  investigation_room_pgdata:
