  <text x="1092" y="103" fill="#c9ad7d" font-family="Georgia, serif" font-size="15" text-anchor="end">Police first-pass visual summary</text>

  <path d="M332 220 C430 212 502 210 596 216" stroke="#a13e34" stroke-width="7" fill="none"/>
  <path d="M742 224 C792 210 860 196 930 210" stroke="#a13e34" stroke-width="7" fill="none"/>
  <path d="M302 520 C424 490 512 470 624 470" stroke="#a13e34" stroke-width="7" fill="none"/>
  <path d="M740 468 C822 452 906 440 1010 446" stroke="#a13e34" stroke-width="7" fill="none"/>

  <g transform="translate(110 132) rotate(-3)">
    <rect width="210" height="164" rx="12" fill="#efe1c4" stroke="#dbc29b" stroke-width="3"/>
    <rect x="18" y="18" width="174" height="92" rx="10" fill="#75614a"/>
    <rect x="28" y="28" width="154" height="72" rx="8" fill="#3d3128"/>
    <path d="M42 82 C62 60 79 48 103 36 C123 56 137 66 166 92" stroke="#baa58b" stroke-width="4" fill="none"/>
    <circle cx="135" cy="54" r="10" fill="#b9a184"/>
    <text x="20" y="132" fill="#5b4331" font-family="Georgia, serif" font-size="17">Service Corridor</text>
    <text x="20" y="150" fill="#7b6048" font-family="Georgia, serif" font-size="14">Collapse point noted</text>
  </g>

  <g transform="translate(378 124) rotate(2)">
    <rect width="268" height="192" rx="14" fill="#e7d3b2" stroke="#d3b38a" stroke-width="3"/>
    <text x="22" y="34" fill="#4d3828" font-family="Georgia, serif" font-size="24">Dinner Timeline</text>
    <line x1="26" y1="54" x2="240" y2="54" stroke="#b99968" stroke-width="2"/>
    <text x="28" y="88" fill="#694f39" font-family="Georgia, serif" font-size="18">9:40 PM  Note delivered</text>
    <text x="28" y="118" fill="#694f39" font-family="Georgia, serif" font-size="18">9:57 PM  Vale leaves table</text>
    <text x="28" y="148" fill="#694f39" font-family="Georgia, serif" font-size="18">10:11 PM  Corridor sighting</text>
    <text x="28" y="178" fill="#9b4138" font-family="Georgia, serif" font-size="18">Time gap not reconciled</text>
  </g>

  <g transform="translate(698 136) rotate(-1)">
    <rect width="292" height="172" rx="14" fill="#f1e2c8" stroke="#d8b990" stroke-width="3"/>
    <text x="22" y="34" fill="#4b3828" font-family="Georgia, serif" font-size="24">Persons of Interest</text>
    <line x1="22" y1="52" x2="268" y2="52" stroke="#ba9a6a" stroke-width="2"/>
    <text x="24" y="84" fill="#6a4f39" font-family="Georgia, serif" font-size="17">Mara Voss  -  motive / timing</text>
    <text x="24" y="114" fill="#6a4f39" font-family="Georgia, serif" font-size="17">Dr. Wren  -  toxicology link</text>
    <text x="24" y="144" fill="#6a4f39" font-family="Georgia, serif" font-size="17">Rohan Bell  -  ledger irregularity</text>
  </g>

  <g transform="translate(132 360) rotate(1)">
    <rect width="238" height="214" rx="14" fill="#ddc29f" stroke="#cda87b" stroke-width="3"/>
    <rect x="16" y="18" width="206" height="82" rx="10" fill="#f3e6d1"/>
    <line x1="30" y1="40" x2="198" y2="40" stroke="#bda07b" stroke-width="2"/>
    <line x1="30" y1="58" x2="198" y2="58" stroke="#bda07b" stroke-width="2"/>
    <line x1="30" y1="76" x2="162" y2="76" stroke="#bda07b" stroke-width="2"/>
    <text x="18" y="124" fill="#614732" font-family="Georgia, serif" font-size="21">Witness extract:</text>
    <text x="18" y="150" fill="#755844" font-family="Georgia, serif" font-size="16">"He left after a folded note."</text>
    <text x="18" y="176" fill="#755844" font-family="Georgia, serif" font-size="16">"No one admits following."</text>
    <text x="18" y="202" fill="#9d4036" font-family="Georgia, serif" font-size="16">Statements conflict on timing.</text>
  </g>

  <g transform="translate(438 384) rotate(-2)">
    <rect width="282" height="170" rx="14" fill="#efe0c2" stroke="#d8b68c" stroke-width="3"/>
    <text x="20" y="34" fill="#4e3a2b" font-family="Georgia, serif" font-size="24">Recovered Note</text>
    <line x1="20" y1="50" x2="254" y2="50" stroke="#bb9c6c" stroke-width="2"/>
    <text x="24" y="86" fill="#6b4f39" font-family="Georgia, serif" font-size="20">Meet upstairs.</text>
    <text x="24" y="116" fill="#6b4f39" font-family="Georgia, serif" font-size="20">Come alone.</text>
    <text x="24" y="148" fill="#9e4137" font-family="Georgia, serif" font-size="18">Source of note unknown</text>
  </g>

  <g transform="translate(760 366) rotate(2)">
    <rect width="296" height="190" rx="14" fill="#f1e4cb" stroke="#d9bc90" stroke-width="3"/>
    <text x="20" y="34" fill="#4f3928" font-family="Georgia, serif" font-size="22">Outstanding Questions</text>
    <line x1="20" y1="52" x2="270" y2="52" stroke="#bc9e70" stroke-width="2"/>
    <text x="22" y="88" fill="#6b513c" font-family="Georgia, serif" font-size="17">Who sent the note?</text>
    <text x="22" y="116" fill="#6b513c" font-family="Georgia, serif" font-size="17">Why was the private suite</text>
    <text x="22" y="140" fill="#6b513c" font-family="Georgia, serif" font-size="17">left out of the file?</text>
    <text x="22" y="168" fill="#6b513c" font-family="Georgia, serif" font-size="17">Which witness timeline is false?</text>
  </g>

  <circle cx="318" cy="214" r="9" fill="#8e2d25"/>
  <circle cx="596" cy="214" r="9" fill="#8e2d25"/>
  <circle cx="742" cy="224" r="9" fill="#8e2d25"/>
