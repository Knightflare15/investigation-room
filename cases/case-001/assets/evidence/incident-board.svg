  <text x="600" y="690" fill="#f4ead7" font-family="Georgia, serif" font-size="50" text-anchor="middle">Incident Board</text>
  <text x="600" y="722" fill="#bda179" font-family="Georgia, serif" font-size="18" text-anchor="middle">Visual attachment to the first-pass police summary</text>
</svg>
